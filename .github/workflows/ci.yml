name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python (lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check institute tests

      - name: Ruff format check
        run: uv run ruff format --check institute tests

      - name: Pytest
        run: uv run pytest

  blog:
    name: Blog (lint, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blog/package-lock.json

      - name: Install dependencies
        working-directory: blog
        run: npm ci

      - name: Astro check
        working-directory: blog
        run: npx astro check

      - name: ESLint
        working-directory: blog
        run: npx eslint .

      - name: Prettier check
        working-directory: blog
        run: npx prettier --check "src/**/*.{astro,ts,tsx,js,jsx,md,mdx}"

      - name: Build
        working-directory: blog
        run: npm run build
